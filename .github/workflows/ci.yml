name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same ref. Saves
# minutes on rapid push-fix-push cycles and removes confusing red marks
# on superseded SHAs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  panel:
    name: panel (backend + frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Real Postgres + Redis. The backend's vitest suite mostly mocks Prisma
    # but `subscription.routes.test.ts` and a handful of others import the
    # real client, which fails fast without a reachable DATABASE_URL. Same
    # logic for BullMQ which mounts on Redis at import time.
    services:
      postgres:
        # I8 - match prod (postgres:16-alpine). Debian `postgres:16` and the
        # alpine image occasionally differ in collation / default settings;
        # testing on the same image we ship removes that drift.
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ice
          POSTGRES_PASSWORD: ice
          POSTGRES_DB: iceslab_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ice"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://ice:ice@localhost:5432/iceslab_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long
      PUBLIC_URL: https://panel.ci.test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Slice 35 — npm audit gate. `--prod` ignores dev-only dependencies
      # (vitest / @types/*) which historically carry lower-stakes
      # transitive vulns we'd rather not gate releases on. `--audit-level
      # high` lets known-medium issues in third-party deps pass while
      # still failing the build on high/critical, where action is
      # expected within hours, not weeks. Tune as the fleet matures.
      - name: pnpm audit (high+)
        run: pnpm audit --prod --audit-level high
        continue-on-error: false

      - name: Prisma generate + migrate
        working-directory: apps/panel-backend
        run: |
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy

      - name: Typecheck backend
        working-directory: apps/panel-backend
        run: pnpm exec tsc --noEmit

      - name: Typecheck frontend
        working-directory: apps/panel-frontend
        run: pnpm exec tsc --noEmit

      - name: Test backend
        working-directory: apps/panel-backend
        run: pnpm test

  node-agent:
    name: node-agent (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          # No go.sum yet (zero external deps) — let setup-go skip cache wiring.
          cache: false

      - name: Build
        working-directory: apps/node
        run: go build ./...

      - name: Vet
        working-directory: apps/node
        run: go vet ./...

      - name: Test
        working-directory: apps/node
        run: go test ./...

  # Slice 36 follow-up — build + publish container images to GHCR on every
  # push to main and on every tag. Pull requests build but don't publish
  # (no creds reach forked-PR jobs). Tag naming follows GHCR convention:
  #   ghcr.io/icecompany-tech/iceslab-backend:main         (rolling)
  #   ghcr.io/icecompany-tech/iceslab-backend:sha-<7c>     (every push)
  #   ghcr.io/icecompany-tech/iceslab-backend:v1.2.3       (only on `v*` tags)
  # The three Dockerfiles already exist (panel-backend / panel-frontend /
  # node-agent) — this job just wraps them.
  docker:
    name: docker (build + publish)
    runs-on: ubuntu-latest
    needs: [panel, node-agent]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - name: iceslab-backend
            context: .
            dockerfile: apps/panel-backend/Dockerfile
          - name: iceslab-frontend
            context: .
            dockerfile: apps/panel-frontend/Dockerfile
          - name: iceslab-node
            context: apps/node
            dockerfile: apps/node/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache via GHA cache (free, ephemeral) — speeds up incremental
          # builds dramatically without needing a paid registry tier.
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

      # I7 - scan the published image for OS-package vulns the npm-audit gate
      # can't see (alpine packages, the Go runtime base, etc). `ignore-unfixed`
      # keeps it actionable: it only fails when a fix is actually available to
      # bump to, so unpatched upstream base CVEs don't wedge every deploy.
      - name: Trivy image scan (HIGH,CRITICAL, fixable)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          vuln-type: os,library
