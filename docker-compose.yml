services:
  postgres:
    image: postgres:16-alpine
    container_name: iceslab-postgres
    environment:
      POSTGRES_USER: iceslab
      POSTGRES_PASSWORD: iceslab_dev
      POSTGRES_DB: iceslab
    ports:
      # Bind to loopback only — a laptop on hotel Wi-Fi with the dev compose
      # up otherwise exposes a weak-cred Postgres to the local network.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-test:
    image: postgres:16-alpine
    container_name: iceslab-postgres-test
    environment:
      POSTGRES_USER: iceslab
      POSTGRES_PASSWORD: iceslab_dev
      POSTGRES_DB: iceslab_test
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: iceslab-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Loopback only — dev Redis has no auth at all.
      - "127.0.0.1:16379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_test_data:
  redis_data:
