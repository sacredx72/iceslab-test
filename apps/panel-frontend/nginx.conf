# nginx config for the panel-frontend container.
#
# Two responsibilities:
#   1. Serve the Vite-built SPA with client-side-routing fallback.
#   2. Reverse-proxy `/api`, `/sub`, `/health` to the backend service so the
#      browser sees a single origin (no CORS).
#
# The upstream `backend` resolves via Docker Compose's service DNS — that
# means this image is opinionated for our compose topology. If you front
# the panel with Traefik/Caddy/your-own-nginx, mount your own conf over
# this file or override via a volume.

# Docker's embedded DNS resolver. Without an explicit `resolver` directive,
# nginx resolves upstreams via gethostbyname() ONCE at startup and caches
# the IP forever — so when the backend container gets a fresh IP after a
# restart, every proxied request 502s until nginx itself is restarted.
# Combined with `set $backend ... ; proxy_pass http://$backend` below, this
# forces a runtime lookup with a 10-second cache. ipv6=off because Compose
# networks don't ship IPv6 records and lookups would block on AAAA.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ───── Security headers ─────
    # Defence-in-depth for the admin panel. `always` sends them on error
    # responses too. nginx does NOT merge add_header into child locations that
    # declare their own add_header, so the two cache locations below re-state
    # these. CSP is intentionally omitted (a wrong policy breaks the Vite /
    # Mantine runtime); add a tested Content-Security-Policy per deployment.
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # The variable in proxy_pass is what activates the runtime resolver
    # path. With a static upstream{} block (the previous setup), nginx
    # short-circuits the resolver entirely — leading to the stale-IP bug.
    set $backend "backend:3000";

    # ───── API proxy ─────
    location /api/ {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ───── Honeypot scanner paths ─────
    # Cycle #6 reality-check 2026-05-12: honeypot trap in backend's
    # security-gate (lib/security-gate.ts) never fired in production because
    # scanner paths like /.env, /wp-admin, /xmlrpc.php were caught by the
    # SPA fallback below and served index.html (200 OK) instead of reaching
    # the backend at all. Forward known scanner prefixes to the backend so
    # the Tier-1 trap (404 fake HTML + IP blacklist + Telegram alert) can
    # actually fire. Case-insensitive so /Wp-Admin / /.GIT/ don't dodge.
    location ~* ^/(\.env(\b|$)|\.git/|\.aws/|wp-admin|wp-login|wp-config\.php|xmlrpc\.php|phpinfo\.php|server-status|phpmyadmin|wordpress) {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    location /sub/ {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        proxy_pass http://$backend;
    }

    # Bull-board UI mounted by panel-backend at /admin/queues. Without
    # this rule the SPA fallback below catches the path and serves
    # index.html — React Router doesn't know /admin/queues and bounces
    # the user to /. Proxy the whole /admin/ prefix so backend tooling
    # (current: Bull-board; future: any server-rendered admin page)
    # reaches the user's browser.
    #
    # ^~ modifier is mandatory: bull-board fetches its own bundle from
    # /admin/queues/static/js/*.js and *.css. Without ^~, the regex
    # location below (\.(?:js|css|...)$) wins by nginx priority rules
    # and tries `try_files $uri =404` against the SPA disk root —
    # all bull-board assets return 404, the dashboard freezes on
    # "Loading...". ^~ tells nginx "if this prefix matches, skip the
    # regex round entirely".
    location ^~ /admin/ {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ───── Static assets ─────
    # Vite emits content-hashed filenames, so we can cache them aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-stated: this location's own add_header drops the server-level ones.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
        try_files $uri =404;
    }

    # index.html is the cache-bust point — never cache it.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        # Re-stated: this location's own add_header drops the server-level ones.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
